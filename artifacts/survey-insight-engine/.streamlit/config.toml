[server]
# Behind Replit's proxy the XSRF cookie gets stripped, so the file-upload POST
# is rejected mid-transfer and the browser reports "AxiosError: Network Error"
# (the upload bar partly fills, then fails). Disabling XSRF + CORS is the
# standard fix for Streamlit served through a reverse proxy / iframe.
enableXsrfProtection = false
enableCORS = false

# Headroom (defaults are 200 MB / 200 MB) — not the cause here, but harmless.
maxUploadSize = 500
maxMessageSize = 500

# Make sure the server binds where the proxy expects it.
headless = true
address = "0.0.0.0"

[browser]
gatherUsageStats = false
